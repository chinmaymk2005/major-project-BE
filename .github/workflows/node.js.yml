name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # ---------- FRONTEND ----------
      - name: Clean install client
        working-directory: client
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build client
        working-directory: client
        run: npm run build

      # ---------- BACKEND ----------
      - name: Clean install server
        working-directory: server
        run: |
          rm -rf node_modules package-lock.json
          npm install